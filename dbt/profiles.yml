ml_pipeline:
  target: dev
  outputs:
    dev:
      type: postgres
      host: "{{ env_var('POSTGRES_HOST', 'localhost') }}"
      port: "{{ env_var('POSTGRES_PORT', '5432') | int }}"
      dbname: "{{ env_var('POSTGRES_DB', 'mlpipeline') }}"
      user: "{{ env_var('POSTGRES_USER', 'mlpipeline') }}"
      password: "{{ env_var('POSTGRES_PASSWORD', 'mlpipeline') }}"
      schema: staging
      threads: 4
